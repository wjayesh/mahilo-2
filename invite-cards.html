<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahilo Invite Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: A5 portrait;
    margin: 5mm;
  }

  body {
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0f0f0;
  }

  .print-instructions {
    max-width: 600px;
    margin: 30px auto;
    padding: 24px;
    background: #FFF8F0;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    color: #4A3728;
    line-height: 1.6;
  }
  .print-instructions h2 { margin-bottom: 12px; }
  .print-instructions ol { padding-left: 20px; }
  .print-instructions li { margin-bottom: 8px; }
  .print-instructions .btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 24px;
    background: linear-gradient(135deg, #FF9E6B, #FFB88C);
    color: #4A3728;
    border: none;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
  }

  @media print {
    .print-instructions { display: none; }
    body { background: white; }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
  }

  /* Each page: 3 columns x 3 rows = 9 cards */
  .page {
    width: 148mm;
    height: 210mm;
    margin: 10px auto;
    background: white;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 3mm;
    padding: 4mm 5mm;
    page-break-after: always;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  @media print {
    .page {
      box-shadow: none;
      margin: 0;
    }
  }

  /* --- FRONT CARD --- */
  .card-front {
    border-radius: 3mm;
    background: linear-gradient(135deg, #FFF8F0 0%, #FFECD9 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-front::before {
    content: '';
    position: absolute;
    top: -12mm;
    right: -8mm;
    width: 30mm;
    height: 30mm;
    border-radius: 50%;
    background: rgba(255, 158, 107, 0.12);
  }

  .brand-wordmark {
    display: flex;
    align-items: center;
    z-index: 1;
  }

  .brand-wordmark .letter {
    font-size: 26px;
    font-weight: 800;
    color: #4A3728;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .brand-wordmark .logo-o {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 0 -1px;
    position: relative;
    top: 1px;
  }

  .brand-wordmark .logo-o svg {
    width: 25px;
    height: 25px;
  }

  .card-front .tagline {
    margin-top: 3mm;
    font-size: 8px;
    font-weight: 600;
    color: #7A6758;
    letter-spacing: 0.03em;
    text-transform: lowercase;
    z-index: 1;
    text-align: center;
    line-height: 1.3;
    padding: 0 2mm;
  }

  .card-front .url {
    position: absolute;
    bottom: 2.5mm;
    font-size: 8px;
    font-weight: 700;
    color: #E8854E;
    letter-spacing: 0.02em;
  }

  /* --- BACK CARD --- */
  .card-back {
    border-radius: 3mm;
    background: #FFF8F0;
    border: 0.5px solid #E8D5C4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    color: #4A3728;
  }

  .card-back .qr-container {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-back .qr-container img {
    width: 36mm;
    height: 36mm;
  }

  .card-back .hint {
    margin-top: 2mm;
    font-size: 7px;
    font-weight: 600;
    color: #7A6758;
    letter-spacing: 0.01em;
    text-align: center;
    padding: 0 1mm;
  }

  .card-back .mini-logo {
    position: absolute;
    top: 2mm;
    right: 2.5mm;
    opacity: 0.3;
  }
  .card-back .mini-logo svg {
    width: 10px;
    height: 10px;
  }

  /* Cut guides */
  .card-front, .card-back {
    outline: 0.5px dashed rgba(0,0,0,0.12);
    outline-offset: 0.5mm;
  }

  @media print {
    .card-front, .card-back {
      outline: 0.3px dashed rgba(0,0,0,0.18);
      outline-offset: 0.5mm;
    }
  }
</style>
</head>
<body>

<div class="print-instructions">
  <h2>Mahilo Invite Cards (QR) - Print Guide</h2>
  <ol>
    <li><strong>Paper:</strong> A5</li>
    <li><strong>Print:</strong> Double-sided, flip on <strong>short edge</strong></li>
    <li><strong>Cards per page:</strong> 9 (3x3 grid)</li>
    <li><strong>Total:</strong> 8 pages (4 front + 4 back), 30 cards</li>
    <li><strong>Cut:</strong> Follow dashed outlines</li>
  </ol>
  <button class="btn" onclick="window.print()">Print Cards</button>
</div>

<script>
const codes = [
  "mhinv_4npPcJae_Wp2nFTB8qUSX7gwW-kfPegcY",
  "mhinv_7ZB6zbUh_RSdKL8CzS-apKAiIT3aQdvt6",
  "mhinv_zxJxqiLh_sECO6w_7PiID7tEtW085cnZw",
  "mhinv_dkgBq8i4_WG_hyi4Zh-VB4e-vieqRrM-7",
  "mhinv_wp1sePyb_nnDKKQg6CumJyEW5JImVZ87J",
  "mhinv_C-ZdcuWO_fMx1NLpfiF4gHlqBK0YbogjN",
  "mhinv_fFwk7l5J_lCqGkuOnKdq_HLyeptimh-we",
  "mhinv_Zg6MKidp_o_k1UtIwa8Uh2xBFe8o1QcPy",
  "mhinv_IFgkOpIb_SZqvRRZJokQROztvrnfXZdN9",
  "mhinv_tePKz96w_3W5S7LC1-R0UDqr31wCAuDay",
  "mhinv_pPDE7NOW_vtlJFduUyGyeKKNhdLElpzD1",
  "mhinv_5Gtc1q5-_fYmHO5sDVvLw0dM-lBUeJv6g",
  "mhinv_KhHKzc8Z_ZtqGhEwKISi6mIzR8bKEAoBo",
  "mhinv_Y0w5RYy9_R3Fjq9cIy8G2P8aBS7OXmC-X",
  "mhinv_gA_4BaB5_Gy91Cl9tOMWL8HxNFOW8o5Gz",
  "mhinv_ChxBcrMa_jep9kP_RSuB6pkC2ofDmQE5s",
  "mhinv_BDfa8-Rc_g-8RFJ6kT-PfvqDtN2fBIJRN",
  "mhinv_W8GPRvv8_Q5avnrDIxByutXZTl_JaSS5F",
  "mhinv_Nfp-x41J_uu1STd-sixh2bVPSuDLQI0T5",
  "mhinv_dOXJ3QHY_EzCpUTFGFRXQvSagyZjgAyct",
  "mhinv_awopRQwu_t74N6jBWV4VDNig4r_HhNlic",
  "mhinv_4e7HencF_9C09KrFv5wapdAF3HW3eOu6S",
  "mhinv_p7vtKiNp_S9b2Jcf4suvU4fEN_1Ga7FXp",
  "mhinv_shreIzE3_uDRX1wnoPm4cYgNuPWP3Kvik",
  "mhinv_5xVZlkVD_zA2F4Vun505a52H0-0WT3mN-",
  "mhinv_JfKoK6a0_X_ezc0JZ3zcSkuN44MsiiPz2",
  "mhinv_poA7vzau_loBCXs7JFQ14LYv0dfcjYtag",
  "mhinv__-6KHnBW_2WNmlmjuLbHWpAANseGf9gc_",
  "mhinv_nY4hswB0_yfQO1mzo2BrgIlq88vj03OK1",
  "mhinv_1meMkiMR_2-4xf4UFGyIv_9WpB71V9eWN"
];

const logoSVG = `<svg viewBox="0 0 40 40">
  <defs>
    <linearGradient id="lg__ID__" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9E6B"/>
      <stop offset="100%" style="stop-color:#FFB88C"/>
    </linearGradient>
  </defs>
  <path d="M20 5 C30 5, 37 13, 37 20 C37 30, 29 37, 20 37 C10 37, 3 29, 3 20 C3 10, 11 5, 20 5"
        fill="url(#lg__ID__)"/>
  <ellipse cx="15" cy="17" rx="3" ry="4" fill="#4A3728"/>
  <ellipse cx="25" cy="17" rx="3" ry="4" fill="#4A3728"/>
  <ellipse cx="20" cy="24" rx="4" ry="3" fill="#4A3728"/>
</svg>`;

function makeQRDataURL(text) {
  const qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  return qr.createDataURL(6, 0);
}

function makeFrontCard(id) {
  const svg = logoSVG.replaceAll('__ID__', 'f' + id);
  return `<div class="card-front">
    <div class="brand-wordmark">
      <span class="letter">M</span>
      <span class="letter">a</span>
      <span class="letter">h</span>
      <span class="letter">i</span>
      <span class="letter">l</span>
      <span class="logo-o">${svg}</span>
    </div>
    <span class="tagline">a trust network for AI agents</span>
    <span class="url">mahilo.io</span>
  </div>`;
}

function makeBackCard(id, code) {
  const svg = logoSVG.replaceAll('__ID__', 'b' + id);
  const qrDataURL = makeQRDataURL('https://mahilo.io/invite?code=' + encodeURIComponent(code));
  return `<div class="card-back">
    <div class="mini-logo">${svg}</div>
    <div class="qr-container"><img src="${qrDataURL}" alt="QR"></div>
    <span class="hint">Scan to claim your invite</span>
  </div>`;
}

const container = document.body;
const CARDS_PER_PAGE = 9;

for (let group = 0; group < Math.ceil(codes.length / CARDS_PER_PAGE); group++) {
  const frontPage = document.createElement('div');
  frontPage.className = 'page';
  for (let i = 0; i < CARDS_PER_PAGE; i++) {
    const idx = group * CARDS_PER_PAGE + i;
    if (idx < codes.length) frontPage.innerHTML += makeFrontCard(idx);
  }
  container.appendChild(frontPage);

  // Back page: reverse order for short-edge double-sided alignment
  // Also reverse column order (right-to-left) since the page flips horizontally
  const backCards = [];
  for (let i = CARDS_PER_PAGE - 1; i >= 0; i--) {
    const idx = group * CARDS_PER_PAGE + i;
    if (idx < codes.length) backCards.push(makeBackCard(idx, codes[idx]));
  }
  const backPage = document.createElement('div');
  backPage.className = 'page';
  backPage.innerHTML = backCards.join('');
  container.appendChild(backPage);
}
</script>

</body>
</html>
